---
- name: Stop and disable Tor
  ansible.builtin.systemd:
    name: tor
    state: stopped
    enabled: false
  failed_when: false

- name: Remove Tor configuration directory (hard remove)
  ansible.builtin.file:
    path: /etc/tor
    state: absent

- name: Remove Tor data directory (hard remove, includes identity)
  ansible.builtin.file:
    path: "{{ tor_data_dir | default('/var/lib/tor') }}"
    state: absent

- name: Remove Tor packages (purge)
  ansible.builtin.apt:
    name: "{{ tor_packages | default(['tor', 'deb.torproject.org-keyring']) }}"
    state: absent
    purge: true
    autoremove: true
    update_cache: true

- name: Remove Tor Project repository (best effort)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/trusted.gpg.d/tor.asc] https://deb.torproject.org/torproject.org {{ ansible_distribution_release }} main"
    filename: torproject
    state: absent
    update_cache: true
  failed_when: false

- name: Remove Tor repo keyring (best effort)
  ansible.builtin.file:
    path: "{{ tor_repo_keyring_path | default('/etc/apt/trusted.gpg.d/tor.asc') }}"
    state: absent
  failed_when: false
